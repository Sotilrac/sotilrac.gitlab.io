summary:
- I'm an engineering leader specializing in robotics, embedded systems, and connected devices. My work spans humanoid robots, autonomous consumer robots, and wearable robotic platforms, always with a focus on delivering across the full product lifecycle, from early concept through commercial deployment.
- Early in my career, I developed physical and verbal interactions for humanoid robots at Softbank Robotics, supporting high-profile public demonstrations that demanded robust real-world performance and intuitive human-robot interaction. That foundation led me to Piaggio Fast Forward, where I helped build a robotics startup from idea stage into a shipped consumer product. I led early system architecture across electrical, embedded software, and robotics, then formed and grew the dedicated EE, software, and robotics teams. The product combined embedded vision-based neural networks for user-following with a patented self-balancing two-wheel drive system, evolving from an initial ROS-based prototype into a custom production platform.
- Currently, I lead architecture and system integration for wearable robotic platforms at Dephy, where our exoskeleton product is now available to consumers. I've re-architected controller systems to enable scalable deployments, and designed telemetry and data infrastructure. I'm now working on the next generation platform in collaboration with Nike. I mentor engineers across firmware, hardware, and software, combining hands-on technical depth with structured system thinking, strong documentation practices, and translating complex robotics challenges into reliable, maintainable products.
