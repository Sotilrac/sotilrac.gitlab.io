summary:
- With a passion for crafting technology that thrives in real-world scenarios, I've been fortunate to be at the forefront of transformative robotic innovations. Notably, designing intuitive interactive behaviours for Softbank Robotics' humanoids, Nao and Pepper.
- This foundation paved the way for my leadership role at Piaggio Fast Forward, where I spearheaded the evolution of Gita from a mere concept to a commercial reality in just three years. Gita, a robot designed to be your personal carrier, was a testament to not just technological prowess but also my ability to assemble and nurture high-performing Electrical, Software, and Robotics Engineering teams.
- Now, at Dephy, I'm channeling my expertise into the realm of wearable robotics (a.k.a. exoskeletons). I've instilled structure and professional rigor into the software division, and more recently, I've initiated and now lead the Electrical Engineering team. Together, we're on a mission to revolutionize mobility with cutting-edge software and embedded systems for exoskeletons.
