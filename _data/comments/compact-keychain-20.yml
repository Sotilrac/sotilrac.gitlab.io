- author: Kevin
  date: "2010-05-07"
  text: |
    I rather like this idea, definitely planning on hitting the hardware store this weekend to try and find some Chicago screws and see if it'll work with my key setup. Might be particularly handy with the various shop discount cards I carry on my keys. Only thing I'd be worried about is my gym key fob, but that shouldn't be too difficult to figure out a solution.

    I like Matt's idea with the jack chain links too, as I'd also need something to provide a hanging loop. I gather something like that could be found at a hardware store as well?
