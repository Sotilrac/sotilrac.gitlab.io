- author: Anonymous
  date: "2008-11-05"
  text: |
    Another option, that;s not wasteful of power:

    a pair of  low voltage zener diode placed in parallel with the load: wired between the shield of the head phones and each signal line, independently. (With the pointy end toward the signal line)

    When the headphone volume is adjusted above the zener's breakdown voltage, it clips the signal above that voltage. The rest of the time, it behaves as a reverse biased diode (minimal current)

    In practical terms, this means that if you turn the volume up too loud, your music sounds distorted, since a good portion of the signal is being clipped. This would make a hard volume limiter.

    Might have to experiment a bit with the zener values...
