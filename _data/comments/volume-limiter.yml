  text: |
    I must congratulate you on your design.  I have always had trouble with these sort of devices - small, fiddly and likely to come apart or look bad because the pieces don't mate well due to small errors in my design.

    I am of the opinion that children's hearing damage is repairable, anyone going to the local swimming pool on a Saturday afternoon will agree, as eventually some 14 year old girl is likely to scream in their ear.  This must happen to children as well, they don't seem to be the worst off because of it when entering adult life.
- author: Carlos
  date: "2007-12-26"
  text: |
    Thanks, I'm happy you like my design.

    I know that children ears (and the rest of their bodies) are very resilient. Nevertheless, listening to very loud music for extended periods of time can cause unrepairable ear damage at least on adults and it is always best to prevent this from happening.
