- author: Carlitos
  date: "2010-02-10"
  text: |
    @badr  
    If the average of Window 1 (W1) is greater (by a certain threshold Th) than the average of Window 2 (W2), then we consider that the sound started. Else, it is still silence (or background noise).

    I hope this helps.
