- author: Leon
  date: "2009-07-21"
  text: |
    I've also been reading about these; apparently they use a simple RL electronic circuit. I figure the two round dots are; where the inducting signal is sent. To write on the card, what kind of pass it is. 
    Is the serial number printed on the back of the card, when it is validated in front of the ticket booth camera?

    I do not think "It is unlikely that the readers in the buses are connected in a network with all metro stations and themselves." because all buses are already connected by radio signals. Not to hard to piggyback another small signal.
