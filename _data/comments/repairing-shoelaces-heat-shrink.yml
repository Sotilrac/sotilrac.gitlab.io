  text: |
    I've also been using shrink wrap tubing on my boot laces for a while now.

    I curious to know if you've found that it tends to stretch and slip off of the laces, of if this is because I use the 'less' expensive type.
- author: Carlitos
  date: "2009-12-29"
  text: |
    @Snow Cat  I had no issues so far. I am currently wearing the boots that use the very same laces I repaired they are doing fine. Maybe try using a smaller size of tubing.

    Good luck and tank you for your interest.
